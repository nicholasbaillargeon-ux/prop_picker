<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB Player Props</title>
<style>
:root {
  color-scheme: light;
  --surface-1: #fcfcfb;
  --surface-2: #f4f3f0;
  --plane: #f9f9f7;
  --text-primary: #0b0b0b;
  --text-secondary: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --series-1: #2a78d6;
  --series-2: #eb6834;
  --good: #0ca30c;
  --good-text: #006300;
  --critical: #d03b3b;
  --warning: #fab219;
  --wash: rgba(42,120,214,0.08);
  --track: #e1e0d9;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --surface-1: #1a1a19; --surface-2: #232322; --plane: #0d0d0d;
    --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --series-2: #d95926; --good-text: #0ca30c;
    --wash: rgba(57,135,229,0.14); --track: #2c2c2a;
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --surface-1: #1a1a19; --surface-2: #232322; --plane: #0d0d0d;
  --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
  --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
  --series-1: #3987e5; --series-2: #d95926; --good-text: #0ca30c;
  --wash: rgba(57,135,229,0.14); --track: #2c2c2a;
}

* { box-sizing: border-box; }
body { margin: 0; background: var(--plane); color: var(--text-primary);
  font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
.wrap { max-width: 1560px; margin: 0 auto; padding: 20px 20px 80px; }
header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
h1 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
.sub { color: var(--text-secondary); font-size: 13px; }
.spacer { flex: 1; }
button, select, input { font: inherit; color: var(--text-primary);
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; }
button { cursor: pointer; }
button:hover { background: var(--wash); }
:focus-visible { outline: 2px solid var(--series-1); outline-offset: 2px; }
.ghost { background: transparent; }
.tabs { display: flex; gap: 6px; margin: 16px 0 12px; }
.tabs button { border-radius: 999px; padding: 6px 15px; }
.tabs button.on { background: var(--series-1); color: #fff; border-color: transparent; }

.filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  padding: 12px 14px; background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 14px; }
.filters label { font-size: 12px; color: var(--text-secondary);
  display: flex; flex-direction: column; gap: 4px; }
.filters .inline { flex-direction: row; align-items: center; gap: 6px; }
input[type="search"] { min-width: 200px; }
select { min-width: 190px; }

.tiles { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.tile { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; min-width: 130px; }
.tile .k { font-size: 12px; color: var(--text-secondary); }
.tile .v { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }

.tablewrap { overflow-x: auto; background: var(--surface-1);
  border: 1px solid var(--border); border-radius: 12px; }
table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
th, td { padding: 8px 12px; text-align: right; white-space: nowrap;
  border-bottom: 1px solid var(--grid); }
th:first-child, td:first-child, th.l, td.l { text-align: left; }
thead th { position: sticky; top: 0; background: var(--surface-1); z-index: 2;
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; border-bottom: 1px solid var(--baseline); }
thead th:hover { color: var(--text-primary); }
thead th .arrow { color: var(--series-1); }
tbody tr { cursor: pointer; }
tbody tr:hover, tbody tr.open { background: var(--wash); }
td.name { font-weight: 500; }
.dim { color: var(--muted); font-size: 12px; }
.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
  padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border);
  color: var(--text-secondary); }
.warnflag { color: var(--critical); }
.ev-pos { color: var(--good-text); font-weight: 600; }
.ev-neg { color: var(--critical); }

/* probability cell: the number, the same number in words, and a strength bar */
.prob { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.prob .pv { font-weight: 600; font-variant-numeric: tabular-nums; }
.prob .pw { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.bar { width: 78px; height: 5px; border-radius: 3px; background: var(--track); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 3px; background: var(--series-1); }
.odds { font-variant-numeric: tabular-nums; }
/* Intentionally quieter than .prob: a 10-game count is a much weaker number
   than a 20,000-sim probability and should not read as its equal. */
.hitrate { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.hitrate .hr-frac { font-variant-numeric: tabular-nums; }
.hitrate .hr-pct { font-size: 11px; }

tr.detail > td { background: var(--plane); padding: 16px 18px; white-space: normal; }
.detailgrid { display: grid; grid-template-columns: minmax(280px, 460px) 1fr;
  gap: 26px; align-items: start; }
@media (max-width: 900px) { .detailgrid { grid-template-columns: 1fr; } }
.kv { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; font-size: 13px; }
.kv dt { color: var(--text-secondary); }
.kv dd { margin: 0; font-variant-numeric: tabular-nums; }
.charttitle { font-size: 13px; font-weight: 600; margin: 0 0 2px; }
.chartsub { font-size: 12px; color: var(--text-secondary); margin: 0 0 8px; }
.legend { display: flex; gap: 14px; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.swatch { width: 11px; height: 11px; border-radius: 3px; }

.hero { background: var(--surface-1); border: 1px solid var(--border);
  border-left: 4px solid var(--series-1); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 14px; }
.hero .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--series-1); margin-bottom: 6px; }
.hero .play { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.hero .where { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.hero .figures { display: flex; gap: 26px; flex-wrap: wrap; margin-bottom: 10px; }
.hero .fig .k { font-size: 11px; color: var(--text-secondary); }
.hero .fig .v { font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums; }
.reasons { display: flex; gap: 6px; flex-wrap: wrap; }
.reason { font-size: 11px; padding: 3px 9px; border-radius: 999px;
  border: 1px solid var(--border); color: var(--text-secondary); }
.reason.warn { color: var(--critical); border-color: var(--critical); }
.bestgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.bestcard { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 15px; }
.bestcard .g { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.bestcard .p { font-size: 15px; font-weight: 600; }
.bestcard .m { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.bestcard .f { display: flex; gap: 16px; font-size: 12px; font-variant-numeric: tabular-nums; }
.bestcard .f b { font-size: 14px; }

/* matchup view */
.matchup { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
.mhead { padding: 14px 18px; border-bottom: 1px solid var(--grid);
  display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap; }
.mhead h3 { margin: 0; font-size: 17px; letter-spacing: -0.01em; }
.mhead .meta { font-size: 12px; color: var(--text-secondary); }
.mgame { display: flex; gap: 26px; flex-wrap: wrap; padding: 12px 18px;
  border-bottom: 1px solid var(--grid); background: var(--surface-2); }
.mgame .blk .k { font-size: 11px; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.06em; }
.mgame .blk .v { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
.mgame .blk .s { font-size: 12px; color: var(--text-secondary); }
.sides { display: grid; grid-template-columns: 1fr 1fr; }
@media (max-width: 880px) { .sides { grid-template-columns: 1fr; } }
.side { padding: 14px 18px; }
.side + .side { border-left: 1px solid var(--grid); }
@media (max-width: 880px) { .side + .side { border-left: 0; border-top: 1px solid var(--grid); } }
.side h4 { margin: 0 0 2px; font-size: 15px; }
.side .tag { font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); }
.sp { display: flex; justify-content: space-between; gap: 10px; cursor: pointer;
  padding: 9px 11px; border-radius: 9px; background: var(--surface-2);
  margin: 9px 0 12px; font-size: 13px; }
.sp:hover { background: var(--wash); }
.sp .n { font-weight: 600; }
.sp .s { color: var(--text-secondary); font-variant-numeric: tabular-nums; font-size: 12px; }
.lineup { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.lineup td { padding: 5px 6px; border-bottom: 1px solid var(--grid);
  text-align: right; white-space: nowrap; }
.lineup td.sl { text-align: left; color: var(--muted); width: 20px; }
.lineup td.pn { text-align: left; font-weight: 500; white-space: normal; }
.lineup tbody tr:hover { background: var(--wash); cursor: pointer; }
.lineup .hdr td { color: var(--text-secondary); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.lineup .hdr:hover { background: none; cursor: default; }

.empty { padding: 40px; text-align: center; color: var(--text-secondary); }
.note { font-size: 12px; color: var(--text-secondary); margin: 10px 2px; line-height: 1.6; }
.banner { background: var(--surface-1); border: 1px solid var(--border);
  border-left: 4px solid var(--warning); border-radius: 10px;
  padding: 11px 15px; margin-bottom: 14px; font-size: 13px; color: var(--text-secondary); }
.banner code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }
svg { display: block; max-width: 100%; }
.tt { position: fixed; pointer-events: none; z-index: 50; opacity: 0;
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; font-size: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.14); transition: opacity .1s;
  font-variant-numeric: tabular-nums; }
.live { display: inline-flex; align-items: center; gap: 7px; font-size: 12px;
  padding: 4px 11px; border-radius: 999px; border: 1px solid var(--border);
  color: var(--text-secondary); background: var(--surface-1); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
.dot.on { background: var(--good); animation: pulse 2.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
@media (prefers-reduced-motion: reduce) { .dot.on { animation: none } }
.toast { position: fixed; left: 50%; bottom: 26px;
  transform: translateX(-50%) translateY(14px); background: var(--surface-1);
  color: var(--text-primary); border: 1px solid var(--border);
  border-left: 4px solid var(--good); border-radius: 10px; padding: 11px 18px;
  font-size: 13px; z-index: 60; box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
  max-width: min(560px, 92vw); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>MLB Player Props</h1>
    <span class="sub" id="slatemeta"></span>
    <span class="spacer"></span>
    <span class="live" id="live" hidden><i class="dot" id="dot"></i><span id="livetext">—</span></span>
    <button class="ghost" id="theme" title="Switch between light and dark">◐ Theme</button>
    <button class="ghost" id="csv">Export CSV</button>
    <button class="ghost" id="reload" title="Re-fetch from the local server">↻ Reload</button>
  </header>

  <div class="tabs">
    <button data-tab="best" class="on">Best bets</button>
    <button data-tab="games">Matchups</button>
    <button data-tab="props">Prop board</button>
  </div>

  <div id="view"></div>
</div>
<div class="tt" id="tt"></div>
<div class="toast" id="toast"></div>

<script>
let DATA = window.SLATE_DATA || {games: [], recommendations: [], date: ""};

// ---------------------------------------------------------------------------
// Markets, grouped so the picker reads as real families rather than one long
// undifferentiated list of fifteen chips.
// ---------------------------------------------------------------------------
const MARKET_GROUPS = [
  {group: "Batting", markets: [
    ["hits", "Hits"],
    ["total_bases", "Total bases"],
    ["hits_runs_rbis", "Hits + Runs + RBI"],
    ["home_runs", "Home runs"],
    ["rbi", "RBI"],
    ["runs", "Runs scored"],
    ["singles", "Singles"],
    ["doubles", "Doubles"],
    ["triples", "Triples"],
    ["walks", "Walks"],
    ["batter_strikeouts", "Strikeouts"]]},
  {group: "Pitching", markets: [
    ["pitcher_strikeouts", "Strikeouts"],
    ["pitcher_outs", "Outs recorded"],
    ["pitcher_earned_runs", "Earned runs"],
    ["pitcher_hits_allowed", "Hits allowed"],
    ["pitcher_walks", "Walks allowed"]]}
];
const MARKET_LABEL = {};
const MARKET_GROUP_OF = {};
for (const g of MARKET_GROUPS)
  for (const [k, v] of g.markets) { MARKET_LABEL[k] = v; MARKET_GROUP_OF[k] = g.group; }
const label = m => MARKET_LABEL[m] || m;
const qualified = m => (MARKET_GROUP_OF[m] === "Pitching" ? "Pitcher " : "") + label(m);

// The line a book most commonly hangs for each market. Used as the default so
// a whole lineup is compared on ONE line -- picking the line nearest each
// player's own projection makes the column incomparable, since a 1.05 hitter
// gets quoted at o1.5 and a 0.95 hitter at o0.5 right next to him.
const STANDARD_LINE = {
  hits: 0.5, total_bases: 1.5, hits_runs_rbis: 1.5, home_runs: 0.5,
  rbi: 0.5, runs: 0.5, singles: 0.5, doubles: 0.5, triples: 0.5,
  walks: 0.5, batter_strikeouts: 0.5,
  pitcher_strikeouts: 5.5, pitcher_outs: 17.5, pitcher_earned_runs: 2.5,
  pitcher_hits_allowed: 4.5, pitcher_walks: 1.5
};

const COMMON_LINES = {
  hits: [0.5, 1.5, 2.5], total_bases: [0.5, 1.5, 2.5, 3.5],
  hits_runs_rbis: [0.5, 1.5, 2.5, 3.5], home_runs: [0.5, 1.5],
  rbi: [0.5, 1.5, 2.5], runs: [0.5, 1.5], singles: [0.5, 1.5],
  doubles: [0.5], triples: [0.5], walks: [0.5, 1.5],
  batter_strikeouts: [0.5, 1.5, 2.5],
  pitcher_strikeouts: [3.5, 4.5, 5.5, 6.5, 7.5, 8.5],
  pitcher_outs: [11.5, 12.5, 13.5, 14.5, 15.5, 16.5, 17.5, 18.5, 19.5, 20.5, 21.5],
  pitcher_earned_runs: [1.5, 2.5, 3.5],
  pitcher_hits_allowed: [3.5, 4.5, 5.5, 6.5], pitcher_walks: [1.5, 2.5]
};

// ---------------------------------------------------------------------------
// Making a probability legible.
//
// "43.7%" is precise but hard to feel. Showing the same number three ways --
// the percentage, a nearest simple fraction, and the price it implies -- lets
// a reader use whichever they actually think in.
// ---------------------------------------------------------------------------
const pct = v => (v * 100).toFixed(1) + "%";
const signed = v => (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
const american = v => (v > 0 ? "+" : "") + Math.round(v);

function fairOdds(p) {
  if (!(p > 0 && p < 1)) return "—";
  const dec = 1 / p;
  return dec >= 2 ? "+" + Math.round((dec - 1) * 100)
                  : "-" + Math.round(100 / (dec - 1));
}

function inWords(p) {
  if (!(p > 0 && p < 1)) return "";
  if (p >= 0.99) return "near certain";
  if (p <= 0.01) return "very unlikely";
  let best = null;
  for (let den = 2; den <= 10; den++) {
    const num = Math.round(p * den);
    if (num < 1 || num >= den) continue;
    const err = Math.abs(num / den - p);
    if (!best || err < best.err - 1e-9) best = {num, den, err};
  }
  if (!best || best.err > 0.045) return `about 1 in ${Math.round(1 / p)}`;
  return `about ${best.num} in ${best.den}`;
}

// ---------------------------------------------------------------------------
// Innings.
//
// An out is a third of an inning, and outs-recorded markets are quoted in outs
// while everyone reads and talks in innings. Baseball notation is exact for a
// whole number of outs -- 16 outs is 5.1, meaning five innings and one out --
// so the ladder below converts precisely rather than approximately.
//
// Decimal innings and baseball notation genuinely disagree (15.6 outs is 5.2
// decimal innings but reads as 5.1 in a box score), so outs stay the primary
// number everywhere and innings are shown alongside, never instead.
// ---------------------------------------------------------------------------
const THIRDS = ["", "\u2153", "\u2154"];  // "", 1/3, 2/3

function ipNotation(outs) {
  const o = Math.round(outs);
  return `${Math.floor(o / 3)}.${o % 3}`;
}
function ipPretty(outs) {
  const o = Math.round(outs);
  return `${Math.floor(o / 3)}${THIRDS[o % 3]}`;
}
function ipFromMeanOuts(outs) {
  // Mean outs is fractional; show it to a third so it stays comparable with
  // the ladder rather than silently switching to decimal innings.
  const thirds = Math.round(outs);
  return `${Math.floor(thirds / 3)}${THIRDS[thirds % 3]}`;
}

// ---------------------------------------------------------------------------
// DOM helpers
// ---------------------------------------------------------------------------
const $ = s => document.querySelector(s);
const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined && v !== false) n.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid === null || kid === undefined || kid === false) continue;
    n.appendChild(typeof kid === "object" ? kid : document.createTextNode(kid));
  }
  return n;
};

function probCell(p) {
  const bar = el("div", {class: "bar"});
  bar.appendChild(el("i", {style: `width:${Math.max(2, Math.min(100, p * 100))}%`}));
  return el("div", {class: "prob"},
    el("span", {class: "pv"}, pct(p)),
    el("span", {class: "pw"}, inWords(p)),
    bar);
}

// How often the player cleared this exact line recently -- last 10 games for a
// hitter, last 5 starts for a pitcher. Returns null when there is no history, so
// callers can render "—" instead of a misleading 0%.
// The cell is either the slate's self-describing {hit, of, rate} or, in the
// exported artifact, a bare hit count -- build_artifact.py drops the two derived
// keys to save ~350 KB. Both shapes reduce to the same thing here.
function hitRateAt(context, market, line) {
  const hr = context && context.hit_rates;
  const byLine = hr && hr.markets && hr.markets[market];
  const cell = byLine && byLine[String(line)];
  if (cell === undefined || cell === null) return null;
  const hit = typeof cell === "object" ? cell.hit : cell;
  const of = (typeof cell === "object" && cell.of != null) ? cell.of : hr.games;
  if (!of) return null;
  const rate = (typeof cell === "object" && cell.rate != null) ? cell.rate : hit / of;
  return {rate, hit, of, basis: hr.basis, from: hr.from, to: hr.to};
}

// The historical rate and the model's probability are different kinds of number
// and are deliberately styled differently: the model gets the bar, the hit rate
// gets a plain "7/10". Making them look alike would invite reading a 5-start
// sample as if it carried the same weight as 20,000 simulations.
function hitRateCell(h) {
  if (!h) return el("span", {class: "dim"}, "—");
  return el("div", {class: "hitrate"},
    el("span", {class: "hr-frac"}, `${h.hit}/${h.of}`),
    el("span", {class: "hr-pct dim"}, pct(h.rate)));
}

// A recommendation's hit rate oriented to the side actually being bet: an Under
// play wants the games he *failed* to clear it. Counting an Under's history with
// the Over's numerator is the kind of error nobody notices on a board.
function hitRateForSide(context, market, line, side) {
  const h = hitRateAt(context, market, line);
  if (!h) return null;
  if ((side || "").toLowerCase() !== "under") return h;
  const hit = h.of - h.hit;
  return {...h, hit, rate: h.of ? hit / h.of : 0};
}

function overFromPmf(pmf, line) {
  let over = 0, total = 0;
  for (const [k, v] of Object.entries(pmf || {})) { total += v; if (+k > line) over += v; }
  return total > 0 ? over / total : 0;
}
function marketLines(market, m) {
  if (m && m.lines) return Object.keys(m.lines).map(Number).sort((a, b) => a - b);
  return COMMON_LINES[market] || [0.5, 1.5, 2.5];
}
function overAt(m, line) {
  if (m && m.lines && m.lines[String(line)]) return m.lines[String(line)].over;
  return overFromPmf(m && m.pmf, line);
}
function mainLine(market, m) {
  const lines = marketLines(market, m);
  if (!lines.length) return null;
  // An explicit override from the line picker wins; otherwise the market's
  // standard line, so every row in a lineup is quoted on the same number.
  // Pitcher and batter markets carry independent line overrides, so changing
  // the pitcher market never leaves a batter line applied to it (or vice versa).
  const slot = MARKET_GROUP_OF[market] === "Pitching" ? state.pitcherLine : state.line;

  if (chosen !== undefined && lines.includes(chosen)) return chosen;
  if (chosen !== undefined) return chosen;
  return lines[0];
}

// ---------------------------------------------------------------------------
// Tooltip

function showTip(evt, html) {
  const t = $("#tt"); t.innerHTML = html; t.style.opacity = 1;
  const pad = 14; let x = evt.clientX + pad, y = evt.clientY + pad;
  const r = t.getBoundingClientRect();
  if (x + r.width > innerWidth - 8) x = evt.clientX - r.width - pad;
  if (y + r.height > innerHeight - 8) y = evt.clientY - r.height - pad;
  t.style.left = x + "px"; t.style.top = y + "px";
}
const hideTip = () => { $("#tt").style.opacity = 0; };

// ---------------------------------------------------------------------------
// Distribution chart — one measure, one axis, bars split at the line
// ---------------------------------------------------------------------------
function pmfChart(pmf, line, opts = {}) {
  const entries = Object.entries(pmf || {}).map(([k, v]) => [+k, +v])
    .sort((a, b) => a[0] - b[0]);
  if (!entries.length) return el("div", {class: "dim"}, "no distribution");
  const W = opts.width || 470, H = 195, M = {t: 10, r: 12, b: 30, l: 36};
  const iw = W - M.l - M.r, ih = H - M.t - M.b;
  const maxP = Math.max(...entries.map(e => e[1]));
  const n = entries.length, slot = iw / n;
  const bw = Math.max(5, Math.min(38, slot - 3));
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("width", W); svg.setAttribute("height", H);
  svg.setAttribute("role", "img");
  const mk = (t, a) => { const e = document.createElementNS(ns, t);
    for (const [k, v] of Object.entries(a)) e.setAttribute(k, v); return e; };

  for (let i = 0; i <= 2; i++) {
    const y = M.t + ih - (ih * i / 2);
    svg.appendChild(mk("line", {x1: M.l, x2: W - M.r, y1: y, y2: y,
      stroke: "var(--grid)", "stroke-width": 1}));
    const lab = mk("text", {x: M.l - 6, y: y + 4, "text-anchor": "end",
      fill: "var(--muted)", "font-size": 10});
    lab.textContent = Math.round(maxP * i / 2 * 100) + "%";
    svg.appendChild(lab);
  }
  const hasLine = line !== null && line !== undefined;
  entries.forEach(([v, p], i) => {
    const h = Math.max(1.5, (p / maxP) * ih);
    const x = M.l + i * slot + (slot - bw) / 2, y = M.t + ih - h;
    const over = !hasLine || v > line;
    const bar = mk("rect", {x, y, width: bw, height: h, rx: 4,
      fill: !hasLine ? "var(--series-1)" : (over ? "var(--series-1)" : "var(--series-2)")});
    bar.addEventListener("mousemove", e => showTip(e,
      `<b>${v}</b> &middot; ${pct(p)}` + (hasLine
        ? `<br><span style="color:var(--muted)">settles ${over ? "over" : "under"} ${line}</span>` : "")));
    bar.addEventListener("mouseleave", hideTip);
    svg.appendChild(bar);
    const t = mk("text", {x: M.l + i * slot + slot / 2, y: H - M.b + 14,
      "text-anchor": "middle", fill: "var(--muted)", "font-size": 10});
    t.textContent = v; svg.appendChild(t);
  });
  if (hasLine) {
    const below = entries.filter(e => e[0] < line).length;
    if (below > 0 && below < n) {
      const x = M.l + below * slot;
      svg.appendChild(mk("line", {x1: x, x2: x, y1: M.t - 2, y2: M.t + ih,
        stroke: "var(--text-primary)", "stroke-width": 2, "stroke-dasharray": "3 3"}));
      const t = mk("text", {x: x + 4, y: M.t + 8, fill: "var(--text-primary)",
        "font-size": 10, "font-weight": 600});
      t.textContent = "line " + line; svg.appendChild(t);
    }
  }
  svg.appendChild(mk("line", {x1: M.l, x2: W - M.r, y1: M.t + ih, y2: M.t + ih,
    stroke: "var(--baseline)", "stroke-width": 1}));
  const wrap = el("div", {}); wrap.appendChild(svg);
  if (hasLine) wrap.appendChild(el("div", {class: "legend"},
    el("span", {}, el("i", {class: "swatch", style: "background:var(--series-1)"}), "Over " + line),
    el("span", {}, el("i", {class: "swatch", style: "background:var(--series-2)"}), "Under " + line)));
  return wrap;
}

function playerDetail(p, market) {
  const mk = p.is_pitcher ? state.pitcherMarket : market;
  const m = p.markets[mk];
  const ln = m ? mainLine(mk, m) : null;
  const box = el("div", {style: "margin-top:12px;padding-top:12px;border-top:1px solid var(--grid)"});
  box.appendChild(el("p", {class: "charttitle"}, p.name + " — " + qualified(mk)));
  if (m) {
    const o = ln !== null ? overAt(m, ln) : null;
    box.appendChild(el("p", {class: "chartsub"},
      `projected ${m.mean} · 10th–90th ${m.p10}–${m.p90}`
      + (o !== null ? ` · ${pct(o)} to clear ${ln} (${inWords(o)}, fair ${fairOdds(o)})` : "")));
    box.appendChild(pmfChart(m.pmf, ln, {width: 420}));
  }
  const ctx = p.context || {};
  const kv = el("dl", {class: "kv", style: "margin-top:12px"});
  const add = (k, v) => { if (v === undefined || v === null || v === "") return;
    kv.appendChild(el("dt", {}, k)); kv.appendChild(el("dd", {}, String(v))); };
  if (p.is_pitcher) {
    // Quoted in outs with innings alongside. Decimal innings (14.4 outs = 4.8)
    // and baseball notation (4.2, meaning four and two-thirds) disagree, so
    // showing the decimal next to the thirds ladder below would read as a
    // contradiction.
    const o = p.markets.pitcher_outs;
    if (o) add("Projected outs", `${o.mean.toFixed(1)} — about ${ipFromMeanOuts(o.mean)} innings`);
    add("Projected pitches", ctx.mean_pitches);
    add("Sample (eff. BF)", ctx.effective_bf);
  } else {
    add("Projected PA", ctx.mean_pa);
    add("Handedness", (ctx.bats || "?") + " vs " + (ctx.opp_sp_throws || "?") + "HP");
    add("Sample (eff. PA)", ctx.effective_pa);
    const l10 = ctx.last10;
    if (l10 && l10.games) add(`Last ${l10.games} games`,
      `${l10.hits} H · ${l10.hr} HR · ${l10.bb} BB · ${l10.k} K in ${l10.pa} PA`);
    const bvp = ctx.vs_pitcher;
    if (bvp && bvp.pa) add("Career vs today's SP",
      `${bvp.hits}-for-${bvp.ab} · ${bvp.hr} HR · ${bvp.k} K — ${bvp.pa} PA`);
  }
  box.appendChild(kv);
  if (p.is_pitcher) {
    const ladder = outsLadder(p.markets.pitcher_outs);
    if (ladder) box.appendChild(ladder);
  }
  if (!p.is_pitcher && (ctx.vs_pitcher || {}).pa)
    box.appendChild(el("p", {class: "note", style: "margin-top:6px"},
      "Career-vs-pitcher is shown for interest and is deliberately kept out of the projection — " +
      "at these sample sizes it carries no predictive signal beyond what the full-season numbers " +
      "already say."));
  return box;
}

// A ladder of "does he record at least N outs", with the innings each out
// count actually represents. Outs markets are quoted in outs but thought about
// in innings, and the whole question when betting one is "how deep does he go" --
// so the useful view is the survival curve, not a single line's probability.
function outsLadder(m) {
  if (!m || !m.pmf) return null;
  const pmf = Object.entries(m.pmf).map(([k, v]) => [+k, +v]);
  const total = pmf.reduce((s, [, v]) => s + v, 0) || 1;
  const lo = Math.max(0, Math.floor(m.p10)), hi = Math.ceil(m.p90) + 1;
  const rows = [];
  for (let n = lo; n <= hi; n++) {
    const p = pmf.reduce((s, [k, v]) => s + (k >= n ? v : 0), 0) / total;
    if (p <= 0.005 || p >= 0.995) continue;
    rows.push([n, p]);
  }
  if (!rows.length) return null;

  const tbl = el("table", {class: "lineup", style: "margin-top:10px"},
    el("thead", {}, el("tr", {class: "hdr"},
      el("td", {class: "sl"}, "Outs"), el("td", {class: "pn"}, "Innings"),
      el("td", {}, "Records at least"), el("td", {}, "Fair"))),
    el("tbody", {}, ...rows.map(([n, p]) => el("tr", {},
      el("td", {class: "sl"}, String(n)),
      el("td", {class: "pn dim"}, `${ipNotation(n)}  (${ipPretty(n)})`),
      el("td", {}, pct(p)),
      el("td", {class: "dim odds"}, fairOdds(p))))));

  return el("div", {},
    el("p", {class: "charttitle", style: "margin-top:14px"}, "How deep he goes"),
    el("p", {class: "chartsub"},
      `Projected ${m.mean.toFixed(1)} outs — about ${ipFromMeanOuts(m.mean)} innings. ` +
      `Each row is the chance he records at least that many.`),
    tbl);
}

function sideBlock(game, teamName, isHome, market) {
  const order = (game.lineup_order || {})[teamName] || [];
  const players = (game.players || []).filter(p => p.team === teamName && !p.is_pitcher);
  const byId = new Map(players.map(p => [p.player_id, p]));
  const sp = (game.players || []).find(p => p.team === teamName && p.is_pitcher);

  const block = el("div", {class: "side"},
    el("div", {class: "tag"}, isHome ? "Home" : "Away"),
    el("h4", {}, teamName));

  if (sp) {
    const outs = sp.markets.pitcher_outs;
    // The quoted probability follows the selected pitcher market. Showing a
    // strikeout number while the user is looking at outs recorded is the whole
    // bug this avoids -- the headline must answer the question being asked.
    const pm = state.pitcherMarket;
    const sel = sp.markets[pm];
    const selLine = sel ? mainLine(pm, sel) : null;
    const selOver = sel && selLine !== null ? overAt(sel, selLine) : null;
    const isOuts = pm === "pitcher_outs";
    block.appendChild(el("div", {class: "sp",
      onclick: () => { const id = "m|" + teamName + "|sp";
        state.open = state.open === id ? null : id; render(); }},
      el("div", {},
        el("div", {class: "n"}, sp.name),
        el("div", {class: "s"}, "Starting pitcher · throws " + (sp.context.throws || "?"))),
      el("div", {class: "s", style: "text-align:right"},
        outs ? `${outs.mean.toFixed(1)} outs · ${ipFromMeanOuts(outs.mean)} IP` : "",
        el("br"),
        // When the selected market IS outs, the line above already states it.
        sel && !isOuts ? `${label(pm)} ${sel.mean.toFixed(1)}` : "",
        sel && !isOuts ? el("br") : "",
        selOver !== null
          ? `${pct(selOver)} over ${selLine}${isOuts ? ` (${ipNotation(Math.ceil(selLine))} IP)` : ""}`
          : "")));
  }

  const tbody = el("tbody", {});
  for (const slot of order) {
    const p = byId.get(slot.id);
    const m = p && p.markets ? p.markets[market] : null;
    const ln = m ? mainLine(market, m) : null;
    const over = m && ln !== null ? overAt(m, ln) : null;
    tbody.appendChild(el("tr", {onclick: () => {
        const id = "m|" + teamName + "|" + slot.id;
        state.open = state.open === id ? null : id; render();
      }},
      el("td", {class: "sl"}, String(slot.slot)),
      el("td", {class: "pn"}, slot.name,
        el("span", {class: "dim"}, " " + (slot.bats || ""))),
      el("td", {}, m ? m.mean.toFixed(2) : "—"),
      el("td", {class: "dim"}, ln !== null ? "o" + ln : "—"),
      el("td", {}, over !== null ? pct(over) : "—"),
      el("td", {class: "dim odds"}, over !== null ? fairOdds(over) : "—")));
  }
  const tbl = el("table", {class: "lineup"},
    el("thead", {}, el("tr", {class: "hdr"},
      el("td", {class: "sl"}, ""), el("td", {class: "pn"}, "Batter"),
      el("td", {}, "Proj"), el("td", {}, "Line"),
      el("td", {}, "Over"), el("td", {}, "Fair"))),
    tbody);
  block.appendChild(tbl);

  const openId = state.open;
  if (openId && openId.startsWith("m|" + teamName + "|")) {
    const key = openId.split("|")[2];
    const target = key === "sp" ? sp : byId.get(+key);
    if (target) block.appendChild(playerDetail(target, market));
  }
  return block;
}

        `${ml.away_team.split(" ").pop()} ${pct(ml.away)} · ${ml.home_team.split(" ").pop()} ${pct(ml.home)}`),
      el("div", {class: "s"}, `fair ${fairOdds(ml.away)} / ${fairOdds(ml.home)}`)));
    if (tot) {
      const o = overAt(tot, 8.5);
      gameRow.appendChild(el("div", {class: "blk"},
        el("div", {class: "k"}, "Projected total"),
        el("div", {class: "v"}, tot.mean.toFixed(1) + " runs"),
        el("div", {class: "s"}, `${pct(o)} over 8.5 · fair ${fairOdds(o)}`)));
    }
    const runs = g.team_runs || {};
    if (Object.keys(runs).length) gameRow.appendChild(el("div", {class: "blk"},
      el("div", {class: "k"}, "Projected score"),
      el("div", {class: "v"}, Object.values(runs).map(v => v.toFixed(1)).join(" – ")),
      el("div", {class: "s"}, Object.keys(runs).map(t => t.split(" ").pop()).join(" – "))));

    return el("div", {class: "matchup"}, head, gameRow,
      el("div", {class: "sides"},
        sideBlock(g, g.away_team, false, state.market),
        sideBlock(g, g.home_team, true, state.market)));
  });

  return el("div", {}, oddsBanner(), filters, ...cards,
    el("p", {class: "note"},
      "Away on the left, home on the right. Batters are in batting order; the pitcher on each " +
      "side is that team's own starter, facing the lineup opposite. Click any row for its " +
      "distribution, recent form, and career history against today's starter."));
}

// ---------------------------------------------------------------------------
// Prop board
// ---------------------------------------------------------------------------
function propRows() {
  const out = [];
  const q = state.q.trim().toLowerCase();
  const wantPitcher = MARKET_GROUP_OF[state.market] === "Pitching";
  const recs = DATA.recommendations || [];
  for (const g of DATA.games || []) {
    if (state.game !== "all" && g.label !== state.game) continue;
    if (state.confirmedOnly && !g.lineups_confirmed) continue;
    for (const p of g.players || []) {
      if (wantPitcher !== !!p.is_pitcher) continue;
      if (q && !p.name.toLowerCase().includes(q)) continue;
      const m = p.markets?.[state.market];
      if (!m) continue;
      const ln = mainLine(state.market, m);
      const over = overAt(m, ln);
      const rec = recs.find(r => r.player === p.name && r.game === g.label
        && r.market === state.market && r.line === ln && r.side === "Over");
      const hr = hitRateAt(p.context, state.market, ln);
      out.push({
        player: p.name, team: p.team, game: g.label,
        slot: p.lineup_slot ?? "—", is_pitcher: p.is_pitcher,
        proj: m.mean, p10: m.p10, p90: m.p90, line: ln,
        over, under: 1 - over, pmf: m.pmf, context: p.context,
        hitRate: hr ? hr.rate : null, hr,
        confirmed: g.lineups_confirmed, gameRef: g,
        ev: rec ? rec.ev : null, book: rec ? rec.best_book : null,
        price: rec ? rec.best_american : null,
        market_prob: rec ? rec.market_prob : null
      });
    }
  }
  const {key, dir} = state.propSort;
  return out.sort((a, b) => {
    const av = a[key], bv = b[key];
    if (typeof av === "string") return dir * av.localeCompare(bv);
    return dir * ((av ?? -Infinity) - (bv ?? -Infinity));
  });
}

function propsView() {
  const rows = propRows();
  const showOdds = hasOdds();

  const filters = el("div", {class: "filters"},
    el("label", {}, "Market",
      marketPicker(v => { state.market = v; state.line = "auto"; state.open = null; render(); },
        state.market)),
    el("label", {}, "Line", linePicker()),
    el("label", {}, "Game", gameSelect()),
    el("label", {}, "Search",
      el("input", {type: "search", placeholder: "player name", value: state.q,
        oninput: e => { state.q = e.target.value; render(); }})),
    el("label", {class: "inline"},
      el("input", {type: "checkbox", checked: state.confirmedOnly ? "checked" : null,
        onchange: e => { state.confirmedOnly = e.target.checked; render(); }}),
      "Confirmed lineups only"));

  const outsMarket = state.market === "pitcher_outs";
  const isPitcher = MARKET_GROUP_OF[state.market] === "Pitching";
  // Column tuples are [sortKey, header, leftAlign?, dupKey?]. `dupKey` marks a
  // column that reuses another's sort key ("Fair odds" is just the over
  // probability in another notation) so only the first of the pair draws the
  // sort arrow. This used to be a hardcoded `i !== 6`, which silently pointed at
  // the wrong column as soon as the optional Innings column shifted the indices.
  const cols = [["player", "Player", true], ["game", "Game", true], ["slot", "Slot"],
    ["proj", "Projected"]];
  if (outsMarket) cols.push(["proj", "Innings", false, true]);
  cols.push(["line", "Line"], ["over", "Chance of over"],
    ["hitRate", isPitcher ? "Last 5 starts" : "Last 10"],
    ["over", "Fair odds", false, true]);
  if (showOdds) cols.push(["price", "Best price"], ["ev", "EV"]);

  const thead = el("thead", {}, el("tr", {}, ...cols.map(([k, t, l, dup]) =>
    el("th", {class: l ? "l" : "", onclick: () => {
      state.propSort = {key: k, dir: state.propSort.key === k ? -state.propSort.dir : -1};
      render();
    }}, t, state.propSort.key === k && !dup
      ? el("span", {class: "arrow"}, state.propSort.dir < 0 ? " ↓" : " ↑") : ""))));

  const tbody = el("tbody", {});
  rows.forEach(r => {
    const id = "p|" + r.player + "|" + r.game;
    const open = state.open === id;
    const tr = el("tr", {class: open ? "open" : "",
      onclick: () => { state.open = open ? null : id; render(); }},
      el("td", {class: "l name"}, r.player,
        r.confirmed ? "" : el("span", {class: "pill warnflag"}, " ⚠ proj")),
      el("td", {class: "l dim"}, r.game),
      el("td", {}, r.slot),
      el("td", {}, r.proj.toFixed(2)),
      ...(outsMarket ? [el("td", {class: "dim"}, ipFromMeanOuts(r.proj) + " IP")] : []),
      el("td", {class: "dim"},
        "o" + r.line + (outsMarket ? ` (${ipNotation(Math.ceil(r.line))})` : "")),
      el("td", {}, probCell(r.over)),
      el("td", {}, hitRateCell(r.hr)),
      el("td", {class: "odds dim"}, fairOdds(r.over)));
    if (showOdds) {
      tr.appendChild(el("td", {class: "odds"},
        r.price !== null ? `${american(r.price)} ${r.book || ""}` : "—"));
      tr.appendChild(el("td", {class: r.ev > 0 ? "ev-pos" : "ev-neg"},
        r.ev !== null ? (r.ev > 0 ? "▲ " : "▼ ") + signed(r.ev) : "—"));
    }
    tbody.appendChild(tr);

    if (open) {
      const kv = el("dl", {class: "kv"});
      const add = (k, v) => { if (v === undefined || v === null || v === "") return;
        kv.appendChild(el("dt", {}, k)); kv.appendChild(el("dd", {}, String(v))); };
      add(`Clears ${r.line}`, `${pct(r.over)} — ${inWords(r.over)}`);
      add("Stays under", `${pct(r.under)} — ${inWords(r.under)}`);
      add("Model fair odds", `${fairOdds(r.over)} over / ${fairOdds(r.under)} under`);
      // Sits directly under the model's number so the two are read together --
      // the gap between them is the point, not the hit rate on its own.
      if (r.hr) {
        add(r.hr.basis === "starts" ? "Last 5 starts" : "Last 10 games",
          `${r.hr.hit} of ${r.hr.of} cleared ${r.line} (${pct(r.hr.rate)})`);
        if (r.hr.from && r.hr.to) add("Span", `${r.hr.from} → ${r.hr.to}`);
      }
      if (r.price !== null) {
        add("Best book price", `${american(r.price)} @ ${r.book}`);
        add("Market probability", pct(r.market_prob));
        add("EV", signed(r.ev));
      }
      const c = r.context || {};
      if (r.is_pitcher) {
        const o = (r.gameRef.players.find(x => x.name === r.player) || {})
          .markets?.pitcher_outs;
        if (o) add("Projected outs", `${o.mean.toFixed(1)} — about ${ipFromMeanOuts(o.mean)} innings`);
        add("Projected pitches", c.mean_pitches);
      } else {
        add("Lineup slot", r.slot); add("Projected PA", c.mean_pa);
        add("Handedness", (c.bats || "?") + " vs " + (c.opp_sp_throws || "?") + "HP");
        const l10 = c.last10;
        if (l10 && l10.games) add(`Last ${l10.games} games`,
          `${l10.hits} H · ${l10.hr} HR · ${l10.k} K in ${l10.pa} PA`);
        const bvp = c.vs_pitcher;
        if (bvp && bvp.pa) add("Career vs today's SP",
          `${bvp.hits}-for-${bvp.ab} · ${bvp.hr} HR · ${bvp.k} K (${bvp.pa} PA)`);
      }
      add("Park", r.gameRef.park?.name);
      add("Projected total", r.gameRef.game_markets?.total?.mean);
      tbody.appendChild(el("tr", {class: "detail"},
        el("td", {colspan: cols.length},
          el("div", {class: "detailgrid"},
            el("div", {},
              el("p", {class: "charttitle"}, r.player + " — " + qualified(state.market)),
              el("p", {class: "chartsub"},
                `${(DATA.meta?.n_sims || 20000).toLocaleString()} simulated games · ` +
                `projected ${r.proj.toFixed(2)} · 10th–90th ${r.p10}–${r.p90}`),
              pmfChart(r.pmf, r.line, {width: 460}),
              r.is_pitcher
                ? outsLadder((r.gameRef.players.find(x => x.name === r.player) || {})
                    .markets?.pitcher_outs)
                : null),
            el("div", {}, kv)))));
    }
  });

  return el("div", {}, oddsBanner(), filters,
    el("div", {class: "tablewrap"}, el("table", {}, thead, tbody)),
    el("p", {class: "note"},
      el("b", {}, "Chance of over"), " is how often the player clears the line across ",
      (DATA.meta?.n_sims || 20000).toLocaleString(), " simulated games — shown as a percentage, " +
      "in plain terms, and as a bar. ",
      el("b", {}, "Fair odds"), " is what that probability is worth as a price. If a book pays " +
      "better than the fair number, that side has value.",
      showOdds ? "" : " No book prices are loaded, so no edge is claimed."));
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function render() {
  indexPlayers();
  const meta = DATA.meta || {};
  $("#slatemeta").textContent = [
    DATA.date, (DATA.games || []).length + " games",
    meta.n_sims ? meta.n_sims.toLocaleString() + " sims/game" : null,
    DATA.generated_utc ? "built " + DATA.generated_utc.replace("T", " ").slice(0, 16) + "Z" : null
  ].filter(Boolean).join(" · ");
  document.querySelectorAll(".tabs button").forEach(b =>
    b.classList.toggle("on", b.dataset.tab === state.tab));
  const view = $("#view");
  view.innerHTML = "";
  view.appendChild(state.tab === "best" ? bestView()
    : state.tab === "games" ? gamesView() : propsView());
}

document.querySelectorAll(".tabs button").forEach(b =>
  b.addEventListener("click", () => { state.tab = b.dataset.tab; state.open = null; render(); }));

$("#theme").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : cur === "light" ? "dark"
    : (matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", next);
});

$("#csv").addEventListener("click", () => {
  const rows = propRows();
  if (!rows.length) { alert("Nothing to export in the current view."); return; }
  const cols = ["player", "team", "game", "slot", "proj", "line", "over", "under", "price", "book", "ev"];
  const head = ["player", "team", "game", "slot", "projected", "line",
    "chance_over", "chance_under", "best_price", "book", "ev"];
  const csv = [head.join(",")].concat(rows.map(r =>
    cols.map(c => JSON.stringify(r[c] ?? "")).join(","))).join("\n");
  const url = URL.createObjectURL(new Blob([csv], {type: "text/csv"}));
  const a = el("a", {href: url, download: `mlb-${state.market}-${DATA.date || "slate"}.csv`});
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
});

// ---------------------------------------------------------------------------
// Live refresh (server mode only)
// ---------------------------------------------------------------------------
let POLL_MS = 20000, lastGeneration = null, pollTimer = null;

function toast(msg, ms = 8000) {
  const t = $("#toast"); t.innerHTML = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), ms);
}
function setLive(status) {
  const box = $("#live"), dot = $("#dot"), txt = $("#livetext");
  if (!status) { box.hidden = true; return; }
  box.hidden = false;
  dot.className = "dot " + (status.running ? "on" : "off");
  txt.textContent = status.running
    ? (status.games_pending
        ? `Live · ${status.games_confirmed}/${status.games_total} lineups in · watching ${status.games_pending}`
        : `Live · ${status.games_confirmed}/${status.games_total} lineups in`)
    : (status.message || "Auto-refresh idle");
  box.title = [status.message, status.checked_utc
    ? "last checked " + status.checked_utc.replace("T", " ").slice(0, 16) + "Z" : ""]
    .filter(Boolean).join(" · ");
}
async function poll() {
  try {
    const resp = await fetch("api/status?" + Date.now());
    if (!resp.ok) return;
    const status = await resp.json();
    setLive(status);
    if (lastGeneration === null) { lastGeneration = status.generation; return; }
    if (status.generation > lastGeneration) {
      lastGeneration = status.generation;
      const r = await fetch("api/slate?" + Date.now());
      if (r.ok) { DATA = await r.json(); indexPlayers(); render(); }
      const what = (status.changed_games || []).join(", ");
      toast("<b>Slate updated</b> — lineups confirmed"
        + (what ? " for " + what : "") + ". Projections rebuilt.");
    }
    if (!status.running && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } catch (e) { /* standalone */ }
}
$("#reload").addEventListener("click", async () => {
  try {
    const resp = await fetch("api/slate?" + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    DATA = await resp.json(); state.open = null; indexPlayers(); render();
  } catch (e) { alert("Reload needs the local server (python -m mlbprops watch). " + e); }
});

(async () => {
  if (!window.SLATE_DATA) {
    try { const r = await fetch("api/slate"); if (r.ok) DATA = await r.json(); }
    catch (e) { /* standalone with no data */ }
  }
  render();
  try {
    const r = await fetch("api/status");
    if (r.ok) {
      const status = await r.json();
      setLive(status); lastGeneration = status.generation;
      if (status.running) pollTimer = setInterval(poll, POLL_MS);
    }
  } catch (e) { /* standalone */ }
})();
</script>
